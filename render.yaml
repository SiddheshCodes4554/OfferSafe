services:
  # Backend API (Docker)
  - type: web
    name: offer-safe-backend
    env: docker
    dockerfilePath: Dockerfile
    # Using Render's Free tier API instance, but for ML Models you may need to upgrade to Starter/Standard (1GB+ RAM).
    plan: free
    healthCheckPath: /docs
    envVars:
      - key: PORT
        value: 10000

  # Frontend (Static Site)
  - type: web
    name: offer-safe-frontend
    env: static
    # The frontend is built using Vite
    buildCommand: cd frontend && npm install && npm run build
    # Directory where Vite builds static files
    staticPublishPath: frontend/dist
    # If using React Router, fallback to index.html
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Inject the deployed backend URL dynamically so Vite can build with it
      # Render automatically links the backend service using the intrinsic variables
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: offer-safe-backend
          envVarKey: RENDER_EXTERNAL_URL
